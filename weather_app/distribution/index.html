<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESPONSIVE WEATHER APP</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@1,300&family=Montserrat&family=Roboto&display=swap" rel="stylesheet">
<script src="main.js" type="module">
    
</script>
</head>
<body>
    <main class="fade-in">
        <h1 class="offscreen">Responsive Weather App Powered by the open weather API</h1>
        <section id="searchBar" class="search_bar fade-in">
            <form id="searchbar_form" class="searchbar_form" role="search
            " action="">
        <label for="searchbarText" class="offscreen">
            Enter the new location
        </label>
    <input type="text" id="searchbarText" class="searchbarText" role="searchbo
    " size="20" autocomplete="off" placeholder="City, State, Country">
<button id="searchBarButton" class="searchbar_button button" title="submit location" aria-label="Enter Zip Code or City, State, and Country to retrieve weather conditions">
    <i class="fa fa-search"></i>
    <i class="fa fa-sync fa-spin" style="display: none;"></i>
</button>
</form>
        </section>
        <a href="#currentForecast" class="skipLink">Skip to Current Conditions</a>
        <section id="currentForecast" class="current_forecast fade-in" role="region" aria-labelledby="currentForecast_Location">
            <h2 id="currentForecast_Location" class="current_location">Current Conditions</h2>
            <div id="currentForecast_condition" class="current_condition">
            </div>
        </section>
        <a href="#weekForecast" class="skipLink">Skip to Daily Forecast</a>
        <nav id="navBar" class="navbar fade-in">
            <button id="getLocation" class="button"aria-label="Get the current weather conditions for your current location" title="get location" >
                <i class="fa fa-map-marker-alt"></i>
                <i class="fa fa-sync fa-spin" style="display: none;"></i>
            </button>
            <button id="home" class="button" title="home weather" aria-label="Get the current weather conditions for your home location">
                <i class="fa fa-home"></i>
                <i class="fa fa-sync fa-spin" style="display: none;"></i>
            </button>
            <button id="saveLocation" class="button" title="save location" aria-label="Save the current location as your home">
                <i class="fa fa-save"></i>
                <i class="fa fa-sync fa-spin" style="display: none;"></i>
            </button>
            <button id="unit" class="button" title="toggle measurement units" aria-label="toggle between metric and imperial measurement unit">
                <i class="fa fa-chart-bar"></i>
                <i class="fa fa-sync fa-spin" style="display: none;"></i>
            </button>
            <button id="refresh" class="button" title="refresh weather" aria-label="Refresh the weather condition">
                <i class="fa fa-sync-alt"></i>
                <i class="fa fa-sync fa-spin" style="display: none;"></i>
            </button>
        </nav>
        <hr fade-in>
        <section id="weekForecast" class="week_forecast fade-in" role="region" aria-labelledby="weekforecast_title">
            <h2 id="weekForecastTitle" class="week_forecast_title offscreen">Weekly Forecast</h2>
            <div id="weekForecastContent" class="week_forecast_content">

            </div>
        </section>
        <p id="confirmation" class="offscreen" aria-live="assertive"></p>
    </main>
</body>
</html>
